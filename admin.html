<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Admin — Joy Box Company</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--red:#e63030;--navy:#1a2744;--blue:#3a6fd8;--lightblue:#d6e4f7;--white:#ffffff;--silver:#6b7a99;}
body{background:var(--navy);min-height:100vh;font-family:'Nunito',sans-serif;padding:40px 20px;}

/* LOGIN */
.login{display:flex;align-items:center;justify-content:center;min-height:100vh;position:fixed;inset:0;background:var(--navy);z-index:100;}
.login-card{background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.1);border-radius:24px;padding:48px;max-width:360px;width:100%;text-align:center;}
.login-card h1{font-family:'Fredoka One',sans-serif;font-size:32px;color:var(--white);margin-bottom:8px;}
.login-card h1 span{color:var(--red);}
.login-card p{color:rgba(255,255,255,0.5);margin-bottom:28px;font-size:14px;}
.login-card input{width:100%;padding:14px 18px;border:2px solid rgba(255,255,255,0.15);border-radius:12px;background:rgba(255,255,255,0.08);color:var(--white);font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;outline:none;margin-bottom:12px;}
.login-card input::placeholder{color:rgba(255,255,255,0.3);}
.login-btn{width:100%;padding:16px;background:var(--red);color:var(--white);border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;cursor:pointer;letter-spacing:1px;}
.login-btn:hover{background:#ff4d4d;}
.login-error{color:#ff6b6b;font-size:13px;margin-top:10px;display:none;}

/* DASHBOARD */
.dashboard{display:none;}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;flex-wrap:gap;}
header h1{font-family:'Fredoka One',sans-serif;font-size:28px;color:var(--white);}
header h1 span{color:var(--red);}
.logout-btn{background:rgba(255,255,255,0.1);color:var(--white);border:none;padding:10px 20px;border-radius:8px;font-family:'Nunito',sans-serif;font-weight:800;cursor:pointer;font-size:13px;}
.logout-btn:hover{background:rgba(255,255,255,0.2);}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px;}
.stat-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:24px;text-align:center;}
.stat-card .num{font-family:'Fredoka One',sans-serif;font-size:40px;color:var(--red);}
.stat-card .lbl{font-size:11px;font-weight:800;letter-spacing:2px;color:rgba(255,255,255,0.4);margin-top:4px;}

.orders-table{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;overflow:hidden;}
.table-header{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 120px 100px;gap:0;background:rgba(255,255,255,0.07);padding:14px 20px;font-size:11px;font-weight:800;letter-spacing:2px;color:rgba(255,255,255,0.4);}
.order-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 120px 100px;gap:0;padding:16px 20px;border-top:1px solid rgba(255,255,255,0.06);align-items:center;transition:background .2s;}
.order-row:hover{background:rgba(255,255,255,0.04);}
.order-row .cell{font-size:13px;color:var(--white);font-weight:700;padding-right:12px;}
.order-row .cell.muted{color:rgba(255,255,255,0.4);font-size:12px;}
.box-badge{display:inline-block;background:rgba(230,48,48,0.2);color:var(--red);border-radius:6px;padding:3px 10px;font-size:12px;font-weight:900;}
.status-badge{display:inline-block;border-radius:6px;padding:3px 10px;font-size:11px;font-weight:900;letter-spacing:1px;cursor:pointer;}
.status-new{background:rgba(58,111,216,0.2);color:#7aadff;}
.status-packed{background:rgba(255,165,0,0.2);color:#ffa500;}
.status-delivered{background:rgba(76,175,80,0.2);color:#66bb6a;}

.empty{text-align:center;padding:60px 20px;color:rgba(255,255,255,0.3);font-size:16px;font-weight:700;}
.loading{text-align:center;padding:60px 20px;color:rgba(255,255,255,0.3);font-size:14px;}

@media(max-width:700px){
  .table-header,.order-row{grid-template-columns:1fr 1fr;gap:8px;}
  .stats-row{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="login-card">
    <h1>Joy Box <span>Admin</span></h1>
    <p>Enter your password to see all orders</p>
    <input type="password" id="password" placeholder="Password" onkeydown="if(event.key==='Enter')checkLogin()">
    <button class="login-btn" onclick="checkLogin()">🔐 LOGIN</button>
    <div class="login-error" id="login-error">Wrong password. Try again!</div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <header>
    <h1>Joy Box <span>Admin</span></h1>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </header>

  <div class="stats-row">
    <div class="stat-card">
      <div class="num" id="stat-total">-</div>
      <div class="lbl">TOTAL ORDERS</div>
    </div>
    <div class="stat-card">
      <div class="num" id="stat-new">-</div>
      <div class="lbl">NEW ORDERS</div>
    </div>
    <div class="stat-card">
      <div class="num" id="stat-members">-</div>
      <div class="lbl">CREW MEMBERS</div>
    </div>
  </div>

  <!-- ANNOUNCEMENT BOX -->
  <div style="background:rgba(230,48,48,0.15);border:2px solid #e63030;border-radius:16px;padding:20px;margin-bottom:24px;">
    <div style="color:#fff;font-weight:900;font-size:15px;margin-bottom:12px;">📢 SEND WORLDWIDE ANNOUNCEMENT</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <input id="announce-input" placeholder="Type your message to ALL visitors..." maxlength="200"
        style="flex:1;min-width:200px;padding:12px 16px;border-radius:24px;border:2px solid #e63030;background:#0a0a2a;color:#fff;font-size:14px;font-family:'Nunito',sans-serif;outline:none;">
      <button onclick="sendAnnouncement()" style="background:#e63030;color:#fff;border:none;border-radius:24px;padding:12px 24px;font-weight:900;font-size:14px;cursor:pointer;font-family:'Nunito',sans-serif;">SEND 🌍</button>
      <button onclick="clearAnnouncement()" style="background:rgba(255,255,255,0.1);color:#fff;border:none;border-radius:24px;padding:12px 24px;font-weight:900;font-size:14px;cursor:pointer;font-family:'Nunito',sans-serif;">CLEAR ✕</button>
    </div>
    <div id="announce-status" style="color:#00ff88;font-size:13px;font-weight:700;margin-top:8px;display:none;">✅ Announcement sent!</div>
  </div>

  <!-- TABS -->
  <div style="display:flex;gap:12px;margin-bottom:20px;">
    <button onclick="showTab('orders')" id="tab-orders" style="background:var(--red);color:#fff;border:none;padding:10px 28px;border-radius:100px;font-family:'Nunito',sans-serif;font-weight:900;font-size:14px;cursor:pointer;letter-spacing:1px;">📦 ORDERS</button>
    <button onclick="showTab('members')" id="tab-members" style="background:rgba(255,255,255,0.1);color:#fff;border:none;padding:10px 28px;border-radius:100px;font-family:'Nunito',sans-serif;font-weight:900;font-size:14px;cursor:pointer;letter-spacing:1px;">🚲 MEMBERS</button>
    <a href="chat.html" style="background:rgba(255,255,255,0.1);color:#fff;border:none;padding:10px 28px;border-radius:100px;font-family:'Nunito',sans-serif;font-weight:900;font-size:14px;cursor:pointer;letter-spacing:1px;text-decoration:none;display:flex;align-items:center;">💬 CHAT</a>
  </div>

  <!-- ORDERS TABLE -->
  <div id="panel-orders" class="orders-table">
    <div class="table-header">
      <div>CUSTOMER</div>
      <div>KID</div>
      <div>BOX</div>
      <div>ADDRESS</div>
      <div>DATE</div>
      <div>STATUS</div>
    </div>
    <div id="orders-list"><div class="loading">Loading orders...</div></div>
  </div>

  <!-- MEMBERS TABLE -->
  <div id="panel-members" class="orders-table" style="display:none;">
    <div class="table-header" style="grid-template-columns:1fr 1fr 1fr;">
      <div>NAME</div>
      <div>EMAIL</div>
      <div>JOINED</div>
    </div>
    <div id="members-list"><div class="loading">Loading members...</div></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://qbzpyhsbrjagyqsruzcb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_fD1zz60o4p8oEDmWDKJeNg_wd-IAhbs';
const PASSWORD = 'joybox2026';

function checkLogin() {
  const pw = document.getElementById('password').value;
  if (pw === PASSWORD) {
    document.getElementById('login').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadDashboard();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

function logout() {
  document.getElementById('login').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('password').value = '';
}

function showTab(tab) {
  document.getElementById('panel-orders').style.display = tab === 'orders' ? 'block' : 'none';
  document.getElementById('panel-members').style.display = tab === 'members' ? 'block' : 'none';
  document.getElementById('tab-orders').style.background = tab === 'orders' ? 'var(--red)' : 'rgba(255,255,255,0.1)';
  document.getElementById('tab-members').style.background = tab === 'members' ? 'var(--red)' : 'rgba(255,255,255,0.1)';
}

async function loadDashboard() {
  await Promise.all([loadOrders(), loadMembers()]);
}

async function loadMembers() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/members?order=created_at.desc`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
  });
  const members = await res.json();
  document.getElementById('stat-members').textContent = members.length;

  const list = document.getElementById('members-list');
  if (!members.length) { list.innerHTML = '<div class="empty">No members yet!</div>'; return; }

  list.innerHTML = members.map(m => `
    <div class="order-row" style="grid-template-columns:1fr 1fr 1fr;">
      <div class="cell">${m.name || '—'}</div>
      <div class="cell muted">${m.email || '—'}</div>
      <div class="cell muted">${new Date(m.created_at).toLocaleDateString()}</div>
    </div>
  `).join('');
}

async function loadOrders() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/orders?order=created_at.desc`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
  });
  const orders = await res.json();

  document.getElementById('stat-total').textContent = orders.length;
  document.getElementById('stat-new').textContent = orders.filter(o => o.status === 'new').length;

  const list = document.getElementById('orders-list');
  if (!orders.length) { list.innerHTML = '<div class="empty">No orders yet!</div>'; return; }

  list.innerHTML = orders.map(o => `
    <div class="order-row">
      <div class="cell">${o.sender_name || '—'}<br><span class="muted">#JBC-${String(o.order_number).padStart(4,'0')} · ${o.sender_email || ''}</span></div>
      <div class="cell">${o.kid_name || '—'}<br><span class="muted">Age ${o.kid_age || '?'}</span></div>
      <div class="cell"><span class="box-badge">${o.box || '—'}</span></div>
      <div class="cell muted">${o.address || '—'}</div>
      <div class="cell muted">${new Date(o.created_at).toLocaleDateString()}</div>
      <div class="cell"><span class="status-badge status-${o.status}" onclick="cycleStatus('${o.id}','${o.status}',this)">${o.status.toUpperCase()}</span></div>
    </div>
  `).join('');
}


const statusCycle = { new: 'packed', packed: 'delivered', delivered: 'new' };

async function cycleStatus(id, current, el) {
  const next = statusCycle[current];
  await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${id}`, {
    method: 'PATCH',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
    body: JSON.stringify({ status: next })
  });
  el.className = `status-badge status-${next}`;
  el.textContent = next.toUpperCase();
  el.setAttribute('onclick', `cycleStatus('${id}','${next}',this)`);
  document.getElementById('stat-new').textContent = document.querySelectorAll('.status-new').length;
}

async function sendAnnouncement() {
  const msg = document.getElementById('announce-input').value.trim();
  if (!msg) return;
  // clear old ones first
  await fetch(`${SUPABASE_URL}/rest/v1/announcements?active=eq.true`, {
    method: 'PATCH',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
    body: JSON.stringify({ active: false })
  });
  // send new one
  await fetch(`${SUPABASE_URL}/rest/v1/announcements`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: msg, active: true })
  });
  const status = document.getElementById('announce-status');
  status.style.display = 'block';
  setTimeout(() => status.style.display = 'none', 3000);
  document.getElementById('announce-input').value = '';
}

async function clearAnnouncement() {
  await fetch(`${SUPABASE_URL}/rest/v1/announcements?active=eq.true`, {
    method: 'PATCH',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
    body: JSON.stringify({ active: false })
  });
  const status = document.getElementById('announce-status');
  status.textContent = '✅ Announcement cleared!';
  status.style.display = 'block';
  setTimeout(() => { status.style.display = 'none'; status.textContent = '✅ Announcement sent!'; }, 3000);
}
</script>
</body>
</html>
