<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Admin — Joy Box Company</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #0a0a1a; color: #fff; min-height: 100vh; }

.header {
  background: #1a2744;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 3px solid #e63030;
}
.header h1 { font-size: 20px; color: #fff; }
.header span { font-size: 24px; }
.live-dot {
  width: 10px; height: 10px;
  background: #00ff88;
  border-radius: 50%;
  animation: pulse 1.5s infinite;
  margin-left: auto;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.live-label { font-size: 12px; color: #00ff88; font-weight: 700; }

.container { display: flex; height: calc(100vh - 67px); }

.sidebar {
  width: 280px;
  background: #111;
  border-right: 1px solid #222;
  overflow-y: auto;
  flex-shrink: 0;
}
.sidebar-header {
  padding: 14px 16px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.4);
  border-bottom: 1px solid #222;
}
.convo {
  padding: 14px 16px;
  border-bottom: 1px solid #1a1a1a;
  cursor: pointer;
  transition: background 0.15s;
}
.convo:hover { background: #1a1a2a; }
.convo.active { background: #1a2744; border-left: 3px solid #e63030; }
.convo-name { font-size: 14px; font-weight: 700; color: #fff; }
.convo-preview { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.convo-time { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 3px; }
.unread-badge {
  display: inline-block;
  background: #e63030;
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 20px;
  float: right;
  margin-top: 2px;
}

.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
}
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: rgba(255,255,255,0.3);
  gap: 8px;
}
.empty-state .icon { font-size: 48px; }

.msg { display: flex; flex-direction: column; max-width: 70%; }
.msg.visitor { align-self: flex-start; }
.msg.admin { align-self: flex-end; }
.msg-bubble {
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.5;
}
.msg.visitor .msg-bubble { background: #1a2744; color: #fff; border-bottom-left-radius: 4px; }
.msg.admin .msg-bubble { background: #e63030; color: #fff; border-bottom-right-radius: 4px; }
.msg-meta { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 4px; padding: 0 4px; }
.msg.admin .msg-meta { text-align: right; }

.reply-bar {
  padding: 16px 20px;
  border-top: 1px solid #222;
  display: flex;
  gap: 10px;
  background: #111;
}
.reply-bar input {
  flex: 1;
  background: #1a1a2a;
  border: 1px solid #333;
  border-radius: 24px;
  padding: 10px 18px;
  color: #fff;
  font-size: 14px;
  outline: none;
}
.reply-bar input:focus { border-color: #e63030; }
.reply-bar button {
  background: #e63030;
  color: #fff;
  border: none;
  border-radius: 24px;
  padding: 10px 20px;
  font-weight: 700;
  cursor: pointer;
  font-size: 14px;
}
.reply-bar button:hover { background: #c02020; }

.no-convo-selected {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,0.3);
  flex-direction: column;
  gap: 8px;
}
.no-convo-selected .icon { font-size: 64px; }
.no-convo-selected p { font-size: 16px; }
</style>
</head>
<body>

<div class="header">
  <span>🐆</span>
  <h1>Joy Box Chat Admin</h1>
  <div style="margin-left:auto;display:flex;align-items:center;gap:6px;">
    <div class="live-dot"></div>
    <span class="live-label">LIVE</span>
  </div>
</div>

<div class="container">
  <div class="sidebar">
    <div class="sidebar-header">CONVERSATIONS</div>
    <div id="convo-list"><div style="padding:20px;color:rgba(255,255,255,0.3);font-size:13px;">No messages yet...</div></div>
  </div>

  <div class="chat-area" id="chat-area">
    <div class="no-convo-selected">
      <div class="icon">💬</div>
      <p>Select a conversation</p>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://qbzpyhsbrjagyqsruzcb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_fD1zz60o4p8oEDmWDKJeNg_wd-IAhbs';

let activeSession = null;
let allMessages = [];

async function fetchMessages() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/chat_messages?order=created_at.asc&limit=500`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  if (!res.ok) return [];
  return await res.json();
}

async function sendReply(sessionId, visitorName, text) {
  await fetch(`${SUPABASE_URL}/rest/v1/chat_messages`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      session_id: sessionId,
      sender: 'admin',
      name: 'Oliver @ Joy Box',
      message: text,
      created_at: new Date().toISOString()
    })
  });
}

function groupBySessions(messages) {
  const sessions = {};
  messages.forEach(m => {
    if (!sessions[m.session_id]) sessions[m.session_id] = [];
    sessions[m.session_id].push(m);
  });
  return sessions;
}

function timeAgo(iso) {
  const d = new Date(iso);
  const diff = Math.floor((Date.now() - d) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return d.toLocaleDateString();
}

function renderSidebar(sessions) {
  const list = document.getElementById('convo-list');
  const keys = Object.keys(sessions);
  if (keys.length === 0) {
    list.innerHTML = '<div style="padding:20px;color:rgba(255,255,255,0.3);font-size:13px;">No messages yet...</div>';
    return;
  }
  list.innerHTML = keys.map(sid => {
    const msgs = sessions[sid];
    const last = msgs[msgs.length - 1];
    const visitorName = msgs.find(m => m.sender === 'visitor')?.name || 'Visitor';
    const unread = msgs.filter(m => m.sender === 'visitor' && !m.read).length;
    return `<div class="convo ${activeSession === sid ? 'active' : ''}" onclick="selectSession('${sid}')">
      ${unread > 0 ? `<span class="unread-badge">${unread}</span>` : ''}
      <div class="convo-name">${visitorName}</div>
      <div class="convo-preview">${last.message}</div>
      <div class="convo-time">${timeAgo(last.created_at)}</div>
    </div>`;
  }).join('');
}

function renderChat(sessions) {
  if (!activeSession || !sessions[activeSession]) return;
  const msgs = sessions[activeSession];
  const visitorName = msgs.find(m => m.sender === 'visitor')?.name || 'Visitor';

  document.getElementById('chat-area').innerHTML = `
    <div class="chat-messages" id="chat-messages">
      ${msgs.map(m => `
        <div class="msg ${m.sender}">
          <div class="msg-bubble">${m.message}</div>
          <div class="msg-meta">${m.name} · ${timeAgo(m.created_at)}</div>
        </div>
      `).join('')}
    </div>
    <div class="reply-bar">
      <input id="reply-input" placeholder="Reply to ${visitorName}..." onkeydown="if(event.key==='Enter')sendMsg()">
      <button onclick="sendMsg()">Send</button>
    </div>
  `;
  const cm = document.getElementById('chat-messages');
  if (cm) cm.scrollTop = cm.scrollHeight;
}

function selectSession(sid) {
  activeSession = sid;
  refresh();
}

async function sendMsg() {
  const input = document.getElementById('reply-input');
  if (!input || !input.value.trim()) return;
  const text = input.value.trim();
  input.value = '';
  const sessions = groupBySessions(allMessages);
  const visitorName = sessions[activeSession]?.find(m => m.sender === 'visitor')?.name || 'Visitor';
  await sendReply(activeSession, visitorName, text);
  await refresh();
}

async function refresh() {
  allMessages = await fetchMessages();
  const sessions = groupBySessions(allMessages);
  renderSidebar(sessions);
  renderChat(sessions);
}

refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
