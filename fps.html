<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON STRIKE — Joy Box FPS</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
#canvas { display: block; width: 100vw; height: 100vh; }

#hud {
  position: fixed; inset: 0; pointer-events: none; z-index: 10;
}

/* Crosshair */
#crosshair {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 24px; height: 24px;
}
#crosshair::before, #crosshair::after {
  content: ''; position: absolute; background: rgba(0,255,180,0.9);
  box-shadow: 0 0 6px #00ffb4;
}
#crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
#crosshair::after { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }
#crosshair-dot {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 4px; height: 4px; background: #00ffb4; border-radius: 50%;
  box-shadow: 0 0 8px #00ffb4;
}

/* Health */
#health-bar {
  position: absolute; bottom: 40px; left: 40px;
}
#health-label { color: #ff0080; font-size: 11px; font-weight: 700; letter-spacing: 3px; margin-bottom: 6px; text-shadow: 0 0 10px #ff0080; }
#health-track { width: 200px; height: 8px; background: #111; border: 1px solid #ff0080; border-radius: 4px; overflow: hidden; }
#health-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #ff0080, #ff6600); border-radius: 4px; transition: width 0.2s; box-shadow: 0 0 10px #ff0080; }
#health-num { color: #ff0080; font-size: 13px; font-weight: 700; margin-top: 4px; text-shadow: 0 0 8px #ff0080; }

/* Ammo */
#ammo-bar {
  position: absolute; bottom: 40px; right: 40px; text-align: right;
}
#ammo-label { color: #00ffb4; font-size: 11px; font-weight: 700; letter-spacing: 3px; margin-bottom: 4px; text-shadow: 0 0 10px #00ffb4; }
#ammo-num { color: #fff; font-size: 36px; font-weight: 900; text-shadow: 0 0 20px #00ffb4; }
#ammo-max { color: #333; font-size: 18px; }
#reload-msg { color: #ffff00; font-size: 13px; font-weight: 700; letter-spacing: 2px; text-shadow: 0 0 10px #ffff00; margin-top: 4px; display: none; }

/* Wave / Score */
#top-hud {
  position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
  text-align: center;
}
#wave-num { color: #aa00ff; font-size: 13px; font-weight: 700; letter-spacing: 4px; text-shadow: 0 0 15px #aa00ff; }
#score-num { color: #fff; font-size: 28px; font-weight: 900; text-shadow: 0 0 20px #aa00ff; }
#kill-flash { position: absolute; top: 70px; left: 50%; transform: translateX(-50%); color: #ff0080; font-size: 20px; font-weight: 900; letter-spacing: 3px; text-shadow: 0 0 20px #ff0080; opacity: 0; transition: opacity 0.1s; pointer-events: none; }

/* Minimap */
#minimap {
  position: absolute; top: 30px; right: 30px;
  width: 120px; height: 120px;
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(0,255,180,0.3);
  border-radius: 4px;
  overflow: hidden;
}
#minimap canvas { width: 100%; height: 100%; }

/* Hit flash */
#hit-flash {
  position: fixed; inset: 0; pointer-events: none;
  background: rgba(255,0,0,0);
  transition: background 0.1s;
  z-index: 20;
}

/* Vignette */
#vignette {
  position: fixed; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
  z-index: 5;
}

/* Scanlines */
#scanlines {
  position: fixed; inset: 0; pointer-events: none; z-index: 6;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
}

/* Start / Death screens */
#overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.92);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 20px;
}
#overlay h1 {
  font-size: clamp(32px, 6vw, 72px); font-weight: 900; letter-spacing: 6px;
  background: linear-gradient(90deg, #ff0080, #aa00ff, #00ffb4, #ff0080);
  background-size: 400%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  animation: rShift 1s linear infinite;
}
@keyframes rShift { 0%{background-position:0%} 100%{background-position:400%} }
#overlay p { color: #aaa; font-size: 16px; letter-spacing: 2px; text-align: center; max-width: 400px; }
#overlay button {
  background: linear-gradient(135deg, #ff0080, #aa00ff);
  border: none; color: #fff; font-size: 18px; font-weight: 900;
  padding: 16px 48px; border-radius: 100px; cursor: pointer;
  letter-spacing: 2px; box-shadow: 0 0 30px rgba(255,0,128,0.5);
  transition: transform 0.1s, box-shadow 0.1s;
}
#overlay button:hover { transform: scale(1.05); box-shadow: 0 0 50px rgba(255,0,128,0.8); }
#final-score { color: #00ffb4; font-size: 22px; font-weight: 700; letter-spacing: 3px; }

/* Wave announce */
#wave-announce {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  z-index: 50; pointer-events: none; opacity: 0;
  text-align: center;
}
#wave-announce h2 {
  font-size: 64px; font-weight: 900; letter-spacing: 8px;
  background: linear-gradient(90deg, #ff0080, #aa00ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-shadow: none;
}
#wave-announce p { color: #fff; font-size: 18px; letter-spacing: 4px; margin-top: 8px; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div id="crosshair"><div id="crosshair-dot"></div></div>

  <div id="health-bar">
    <div id="health-label">SHIELD</div>
    <div id="health-track"><div id="health-fill"></div></div>
    <div id="health-num">100</div>
  </div>

  <div id="ammo-bar">
    <div id="ammo-label">AMMO</div>
    <div id="ammo-num">30<span id="ammo-max">/30</span></div>
    <div id="reload-msg">⟳ RELOADING...</div>
  </div>

  <div id="top-hud">
    <div id="wave-num">WAVE 1</div>
    <div id="score-num">0</div>
    <div id="kill-flash">ELIMINATED</div>
  </div>

  <div id="minimap"><canvas id="minimap-canvas" width="120" height="120"></canvas></div>
</div>

<div id="hit-flash"></div>
<div id="vignette"></div>
<div id="scanlines"></div>

<div id="wave-announce">
  <h2 id="wave-title">WAVE 1</h2>
  <p id="wave-sub">GET READY</p>
</div>

<!-- Start Screen -->
<div id="overlay">
  <h1>NEON STRIKE</h1>
  <p>WASD to move · Mouse to aim · Click to shoot · R to reload · Survive the waves</p>
  <button onclick="startGame()">⚡ ENTER THE ZONE</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── SCENE SETUP ───────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000011, 0.018);
scene.background = new THREE.Color(0x000011);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 1.7, 0);

// ─── LIGHTING ──────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0x111133, 1.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
scene.add(dirLight);

// Neon point lights
function addNeonLight(color, x, y, z, intensity) {
  const l = new THREE.PointLight(color, intensity, 20);
  l.position.set(x, y, z);
  scene.add(l);
  return l;
}
const lights = [
  addNeonLight(0xff0080, -20, 3, -20, 3),
  addNeonLight(0xaa00ff, 20, 3, -20, 3),
  addNeonLight(0x00ffb4, -20, 3, 20, 3),
  addNeonLight(0x0088ff, 20, 3, 20, 3),
];

// ─── ARENA FLOOR ───────────────────────────────────────────────
const floorGeo = new THREE.PlaneGeometry(100, 100, 40, 40);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x050510,
  metalness: 0.8,
  roughness: 0.2,
  wireframe: false,
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// Grid overlay
const gridHelper = new THREE.GridHelper(100, 50, 0x220044, 0x110022);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// ─── WALLS ─────────────────────────────────────────────────────
function makeWall(w, h, d, x, y, z, color) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const mat = new THREE.MeshStandardMaterial({ color, metalness: 0.9, roughness: 0.1 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, y, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);

  // Neon edge glow
  const edgesGeo = new THREE.EdgesGeometry(geo);
  const edgesMat = new THREE.LineBasicMaterial({ color: 0xaa00ff, transparent: true, opacity: 0.6 });
  const edges = new THREE.LineSegments(edgesGeo, edgesMat);
  mesh.add(edges);

  return mesh;
}

const arenaSize = 45;
const wallH = 8;
makeWall(arenaSize*2, wallH, 1, 0, wallH/2, -arenaSize, 0x0a0015);
makeWall(arenaSize*2, wallH, 1, 0, wallH/2,  arenaSize, 0x0a0015);
makeWall(1, wallH, arenaSize*2, -arenaSize, wallH/2, 0, 0x0a0015);
makeWall(1, wallH, arenaSize*2,  arenaSize, wallH/2, 0, 0x0a0015);

// Cover boxes
const coverPositions = [
  [10,0,10],[-10,0,10],[10,0,-10],[-10,0,-10],
  [20,0,0],[-20,0,0],[0,0,20],[0,0,-20],
  [15,0,-15],[-15,0,15],
];
coverPositions.forEach(([x,,z])=>{
  makeWall(3,3,3, x,1.5,z, 0x080012);
});

// Pillars
for(let i=0;i<8;i++){
  const angle = (i/8)*Math.PI*2;
  const r = 25;
  makeWall(1.5,10,1.5, Math.cos(angle)*r, 5, Math.sin(angle)*r, 0x0a0018);
}

// Ceiling strips
const ceilingMat = new THREE.MeshStandardMaterial({ color: 0xaa00ff, emissive: 0xaa00ff, emissiveIntensity: 2 });
for(let i=0;i<5;i++){
  const strip = new THREE.Mesh(new THREE.BoxGeometry(90,0.1,0.3), ceilingMat);
  strip.position.set(0, wallH, -40+i*20);
  scene.add(strip);
}

// ─── GUN MODEL ─────────────────────────────────────────────────
const gunGroup = new THREE.Group();
camera.add(gunGroup);
scene.add(camera);

const gunBodyGeo = new THREE.BoxGeometry(0.08, 0.06, 0.4);
const gunMat = new THREE.MeshStandardMaterial({ color: 0x1a0030, metalness: 1, roughness: 0.1 });
const gunBody = new THREE.Mesh(gunBodyGeo, gunMat);
gunGroup.add(gunBody);

const barrelGeo = new THREE.CylinderGeometry(0.012, 0.012, 0.3, 8);
const barrelMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 1, roughness: 0.0 });
const barrel = new THREE.Mesh(barrelGeo, barrelMat);
barrel.rotation.x = Math.PI/2;
barrel.position.set(0, 0, -0.3);
gunGroup.add(barrel);

// Neon glow strip on gun
const glowGeo = new THREE.BoxGeometry(0.005, 0.005, 0.38);
const glowMat = new THREE.MeshStandardMaterial({ color: 0x00ffb4, emissive: 0x00ffb4, emissiveIntensity: 5 });
const glowStrip = new THREE.Mesh(glowGeo, glowMat);
glowStrip.position.set(0, 0.032, 0);
gunGroup.add(glowStrip);

const gunLight = new THREE.PointLight(0x00ffb4, 0, 0.5);
gunGroup.add(gunLight);

gunGroup.position.set(0.22, -0.18, -0.4);

// ─── ENEMY SPRITE ──────────────────────────────────────────────
const texLoader = new THREE.TextureLoader();
const enemyTexture = texLoader.load('hero.png');
enemyTexture.colorSpace = THREE.SRGBColorSpace;

const enemies = [];
const ENEMY_COUNT_BASE = 4;
let wave = 1;
let enemiesLeft = 0;

function spawnEnemy() {
  const spriteMat = new THREE.SpriteMaterial({
    map: enemyTexture,
    transparent: true,
    alphaTest: 0.1,
    color: 0xff3333,
  });
  const sprite = new THREE.Sprite(spriteMat);
  const scale = 2.5 + Math.random() * 0.5;
  sprite.scale.set(scale * 0.6, scale, 1);

  const angle = Math.random() * Math.PI * 2;
  const r = 15 + Math.random() * 25;
  sprite.position.set(
    Math.cos(angle) * r,
    scale / 2,
    Math.sin(angle) * r
  );

  const hp = 2 + Math.floor(wave * 0.8);

  // Shadow under enemy
  const shadowGeo = new THREE.CircleGeometry(0.5, 16);
  const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.4 });
  const shadow = new THREE.Mesh(shadowGeo, shadowMat);
  shadow.rotation.x = -Math.PI / 2;
  shadow.position.copy(sprite.position);
  shadow.position.y = 0.02;
  scene.add(shadow);

  scene.add(sprite);
  enemies.push({ sprite, shadow, hp, maxHp: hp, speed: 0.02 + wave * 0.003, dead: false });
  enemiesLeft++;
}

function spawnWave() {
  const count = ENEMY_COUNT_BASE + (wave - 1) * 2;
  for (let i = 0; i < count; i++) setTimeout(() => spawnEnemy(), i * 300);
  enemiesLeft = count;
  showWaveAnnounce();
}

// ─── PARTICLES ────────────────────────────────────────────────
const particles = [];

function spawnParticles(pos, color) {
  for (let i = 0; i < 20; i++) {
    const geo = new THREE.SphereGeometry(0.04 + Math.random() * 0.06, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(pos);
    const vel = new THREE.Vector3(
      (Math.random() - 0.5) * 0.3,
      Math.random() * 0.3,
      (Math.random() - 0.5) * 0.3
    );
    scene.add(mesh);
    particles.push({ mesh, vel, life: 1.0 });
  }
}

function spawnMuzzleFlash() {
  gunLight.intensity = 3;
  setTimeout(() => { gunLight.intensity = 0; }, 60);
}

// Bullet holes on floor
function spawnDecal(pos) {
  const geo = new THREE.CircleGeometry(0.15, 8);
  const mat = new THREE.MeshBasicMaterial({ color: 0x440000, transparent: true, opacity: 0.6 });
  const d = new THREE.Mesh(geo, mat);
  d.rotation.x = -Math.PI / 2;
  d.position.set(pos.x, 0.015, pos.z);
  scene.add(d);
  setTimeout(() => scene.remove(d), 5000);
}

// ─── GAME STATE ────────────────────────────────────────────────
let health = 100;
let score = 0;
let ammo = 30;
let maxAmmo = 30;
let reloading = false;
let gameActive = false;
let dead = false;

// Input
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'KeyR' && !reloading && ammo < maxAmmo && gameActive) startReload();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Mouse look
let yaw = 0, pitch = 0;
document.addEventListener('mousemove', e => {
  if (!gameActive) return;
  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-Math.PI/3, Math.min(Math.PI/3, pitch));
});

// Shoot
document.addEventListener('click', () => {
  if (!gameActive) return;
  shoot();
});

// ─── POINTER LOCK ─────────────────────────────────────────────
function lockPointer() {
  canvas.requestPointerLock();
}
document.addEventListener('pointerlockchange', () => {
  gameActive = document.pointerLockElement === canvas;
});

// ─── SHOOTING ─────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();

function shoot() {
  if (ammo <= 0 || reloading || dead) return;
  ammo--;
  updateAmmoHUD();
  spawnMuzzleFlash();
  animateGunRecoil();

  raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
  const enemySprites = enemies.filter(e => !e.dead).map(e => e.sprite);
  const hits = raycaster.intersectObjects(enemySprites);

  if (hits.length > 0) {
    const hit = hits[0];
    const enemy = enemies.find(e => e.sprite === hit.object);
    if (enemy && !enemy.dead) {
      enemy.hp--;
      spawnParticles(hit.point, 0xff0033);
      if (enemy.hp <= 0) killEnemy(enemy);
    }
  } else {
    // Hit floor/wall
    const floorHits = raycaster.intersectObject(floor);
    if (floorHits.length > 0) spawnDecal(floorHits[0].point);
  }

  if (ammo === 0) startReload();
}

function killEnemy(enemy) {
  enemy.dead = true;
  score += 100 * wave;
  enemiesLeft--;
  spawnParticles(enemy.sprite.position.clone(), 0xff0080);
  scene.remove(enemy.sprite);
  scene.remove(enemy.shadow);
  showKillFlash();
  updateScoreHUD();

  if (enemiesLeft <= 0) {
    setTimeout(() => { wave++; spawnWave(); }, 2500);
  }
}

// ─── GUN RECOIL ───────────────────────────────────────────────
let recoilAnim = null;
function animateGunRecoil() {
  gunGroup.position.z += 0.04;
  gunGroup.rotation.x -= 0.08;
  clearTimeout(recoilAnim);
  recoilAnim = setTimeout(() => {
    gunGroup.position.z = -0.4;
    gunGroup.rotation.x = 0;
  }, 80);
}

// ─── RELOAD ───────────────────────────────────────────────────
function startReload() {
  if (reloading) return;
  reloading = true;
  document.getElementById('reload-msg').style.display = 'block';
  setTimeout(() => {
    ammo = maxAmmo;
    reloading = false;
    document.getElementById('reload-msg').style.display = 'none';
    updateAmmoHUD();
  }, 1800);
}

// ─── HUD UPDATES ──────────────────────────────────────────────
function updateHealthHUD() {
  const pct = Math.max(0, health) / 100;
  document.getElementById('health-fill').style.width = (pct * 100) + '%';
  document.getElementById('health-num').textContent = Math.max(0, health);
  const hue = pct > 0.5 ? 330 : 0;
  document.getElementById('health-fill').style.background = pct > 0.3
    ? 'linear-gradient(90deg,#ff0080,#ff6600)'
    : 'linear-gradient(90deg,#ff0000,#ff3300)';
}
function updateAmmoHUD() {
  document.getElementById('ammo-num').innerHTML = ammo + '<span id="ammo-max">/' + maxAmmo + '</span>';
}
function updateScoreHUD() {
  document.getElementById('score-num').textContent = score.toLocaleString();
  document.getElementById('wave-num').textContent = 'WAVE ' + wave;
}

function showKillFlash() {
  const el = document.getElementById('kill-flash');
  el.style.opacity = 1;
  setTimeout(() => { el.style.opacity = 0; }, 500);
}

function flashHit() {
  const el = document.getElementById('hit-flash');
  el.style.background = 'rgba(255,0,0,0.3)';
  setTimeout(() => { el.style.background = 'rgba(255,0,0,0)'; }, 150);
}

function showWaveAnnounce() {
  const el = document.getElementById('wave-announce');
  document.getElementById('wave-title').textContent = 'WAVE ' + wave;
  document.getElementById('wave-sub').textContent = wave === 1 ? 'GET READY' : 'INCOMING!';
  el.style.opacity = 1;
  el.style.transition = 'opacity 0.3s';
  setTimeout(() => { el.style.opacity = 0; }, 2000);
}

// ─── MINIMAP ──────────────────────────────────────────────────
const mmCanvas = document.getElementById('minimap-canvas');
const mmCtx = mmCanvas.getContext('2d');
const MM_SCALE = 120 / 90;

function drawMinimap() {
  mmCtx.clearRect(0, 0, 120, 120);
  mmCtx.fillStyle = 'rgba(0,0,0,0.8)';
  mmCtx.fillRect(0, 0, 120, 120);

  // Player
  const px = 60 + camera.position.x * MM_SCALE;
  const py = 60 + camera.position.z * MM_SCALE;
  mmCtx.fillStyle = '#00ffb4';
  mmCtx.beginPath();
  mmCtx.arc(px, py, 4, 0, Math.PI * 2);
  mmCtx.fill();

  // Player direction
  mmCtx.strokeStyle = '#00ffb4';
  mmCtx.lineWidth = 1.5;
  mmCtx.beginPath();
  mmCtx.moveTo(px, py);
  mmCtx.lineTo(px + Math.sin(yaw) * -12, py + Math.cos(yaw) * -12);
  mmCtx.stroke();

  // Enemies
  enemies.forEach(e => {
    if (e.dead) return;
    const ex = 60 + e.sprite.position.x * MM_SCALE;
    const ey = 60 + e.sprite.position.z * MM_SCALE;
    mmCtx.fillStyle = '#ff0080';
    mmCtx.beginPath();
    mmCtx.arc(ex, ey, 3, 0, Math.PI * 2);
    mmCtx.fill();
  });
}

// ─── PLAYER MOVEMENT ──────────────────────────────────────────
const velocity = new THREE.Vector3();
const direction = new THREE.Vector3();
const clock = new THREE.Clock();
let bobTime = 0;

function movePlayer(delta) {
  const speed = keys['ShiftLeft'] ? 12 : 7;
  direction.set(0, 0, 0);

  if (keys['KeyW'] || keys['ArrowUp'])    direction.z -= 1;
  if (keys['KeyS'] || keys['ArrowDown'])  direction.z += 1;
  if (keys['KeyA'] || keys['ArrowLeft'])  direction.x -= 1;
  if (keys['KeyD'] || keys['ArrowRight']) direction.x += 1;

  direction.normalize();

  const moveDir = direction.clone().applyEuler(new THREE.Euler(0, yaw, 0));

  velocity.x += moveDir.x * speed * delta;
  velocity.z += moveDir.z * speed * delta;
  velocity.x *= 0.85;
  velocity.z *= 0.85;

  camera.position.x += velocity.x * delta;
  camera.position.z += velocity.z * delta;

  // Clamp to arena
  camera.position.x = Math.max(-arenaSize+1, Math.min(arenaSize-1, camera.position.x));
  camera.position.z = Math.max(-arenaSize+1, Math.min(arenaSize-1, camera.position.z));

  // Head bob
  if (direction.length() > 0) {
    bobTime += delta * 8;
    camera.position.y = 1.7 + Math.sin(bobTime) * 0.05;
    gunGroup.position.y = -0.18 + Math.sin(bobTime) * 0.02;
  } else {
    bobTime = 0;
    camera.position.y += (1.7 - camera.position.y) * 0.1;
  }

  camera.rotation.order = 'YXZ';
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;
}

// ─── ENEMY AI ─────────────────────────────────────────────────
let lastDmgTime = 0;

function updateEnemies(delta) {
  const now = performance.now();
  enemies.forEach(enemy => {
    if (enemy.dead) return;
    const dir = new THREE.Vector3().subVectors(camera.position, enemy.sprite.position).normalize();
    enemy.sprite.position.addScaledVector(dir, enemy.speed);
    enemy.shadow.position.x = enemy.sprite.position.x;
    enemy.shadow.position.z = enemy.sprite.position.z;

    // Damage player on contact
    const dist = enemy.sprite.position.distanceTo(camera.position);
    if (dist < 1.5 && now - lastDmgTime > 800) {
      health -= 10;
      lastDmgTime = now;
      updateHealthHUD();
      flashHit();
      if (health <= 0) triggerDeath();
    }
  });
}

// ─── PARTICLES UPDATE ─────────────────────────────────────────
function updateParticles(delta) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= delta * 2;
    p.vel.y -= delta * 0.5;
    p.mesh.position.addScaledVector(p.vel, delta * 60);
    p.mesh.material.opacity = p.life;
    p.mesh.material.transparent = true;
    if (p.life <= 0) {
      scene.remove(p.mesh);
      particles.splice(i, 1);
    }
  }
}

// ─── NEON LIGHT PULSE ─────────────────────────────────────────
let lightTime = 0;
function pulseLights(delta) {
  lightTime += delta;
  lights[0].intensity = 3 + Math.sin(lightTime * 1.2) * 1;
  lights[1].intensity = 3 + Math.sin(lightTime * 0.9 + 1) * 1;
  lights[2].intensity = 3 + Math.sin(lightTime * 1.5 + 2) * 1;
  lights[3].intensity = 3 + Math.sin(lightTime * 0.7 + 3) * 1;
}

// ─── GAME LOOP ────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  if (gameActive && !dead) {
    movePlayer(delta);
    updateEnemies(delta);
    updateParticles(delta);
    pulseLights(delta);
    drawMinimap();
  }

  renderer.render(scene, camera);
}

// ─── DEATH ────────────────────────────────────────────────────
function triggerDeath() {
  dead = true;
  gameActive = false;
  document.exitPointerLock();
  const overlay = document.getElementById('overlay');
  overlay.innerHTML = `
    <h1>YOU DIED</h1>
    <div id="final-score">SCORE: ${score.toLocaleString()}</div>
    <p>WAVE ${wave} · ${score.toLocaleString()} PTS</p>
    <button onclick="location.reload()">↩ PLAY AGAIN</button>
  `;
  overlay.style.display = 'flex';
}

// ─── START ────────────────────────────────────────────────────
function startGame() {
  document.getElementById('overlay').style.display = 'none';
  lockPointer();
  spawnWave();
  updateHealthHUD();
  updateAmmoHUD();
  updateScoreHUD();
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
