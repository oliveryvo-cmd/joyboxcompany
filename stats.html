<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Joy Box Company — Live Stats</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--red:#e63030;--navy:#1a2744;--lightblue:#d6e4f7;--white:#fff;--silver:#6b7a99;}
body{background:var(--navy);min-height:100vh;font-family:'Nunito',sans-serif;padding:40px 20px;display:flex;flex-direction:column;align-items:center;}

nav{width:100%;max-width:700px;margin-bottom:48px;}
nav a{font-weight:800;color:rgba(255,255,255,0.4);text-decoration:none;font-size:14px;letter-spacing:1px;}
nav a:hover{color:#fff;}

.top{text-align:center;margin-bottom:48px;}
.badge{display:inline-block;background:rgba(230,48,48,0.2);color:var(--red);font-size:11px;font-weight:900;letter-spacing:3px;padding:6px 20px;border-radius:100px;margin-bottom:16px;}
h1{font-family:'Fredoka One',sans-serif;font-size:48px;color:#fff;margin-bottom:8px;}
h1 span{color:var(--red);}
.sub{color:rgba(255,255,255,0.4);font-size:15px;}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;max-width:700px;width:100%;margin-bottom:32px;}
.card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:32px;text-align:center;}
.card.big{grid-column:span 2;}
.num{font-family:'Fredoka One',sans-serif;font-size:64px;color:var(--red);display:block;line-height:1;}
.label{font-size:12px;font-weight:800;letter-spacing:2px;color:rgba(255,255,255,0.4);margin-top:8px;}

.countries{max-width:700px;width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:32px;margin-bottom:32px;}
.countries h2{font-family:'Fredoka One',sans-serif;font-size:24px;color:#fff;margin-bottom:24px;}
.country-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.country-name{font-weight:800;color:#fff;font-size:15px;}
.country-bar-wrap{flex:1;margin:0 16px;background:rgba(255,255,255,0.08);border-radius:100px;height:10px;overflow:hidden;}
.country-bar{height:100%;background:var(--red);border-radius:100px;transition:width 1s ease;}
.country-count{font-family:'Fredoka One',sans-serif;font-size:20px;color:var(--red);}

.share{max-width:700px;width:100%;text-align:center;margin-bottom:32px;}
.share p{color:rgba(255,255,255,0.4);font-size:14px;margin-bottom:16px;}
.share-url{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 20px;color:#fff;font-weight:800;font-size:16px;letter-spacing:1px;}

.live-dot{display:inline-block;width:8px;height:8px;background:#4caf50;border-radius:50%;margin-right:6px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

@media(max-width:500px){.grid{grid-template-columns:1fr;}.card.big{grid-column:span 1;}.num{font-size:48px;}}
</style>
</head>
<body>

<nav><a href="index.html">← Back to Joy Box Company</a></nav>

<div class="top">
  <div class="badge">🎁 JOY BOX COMPANY</div>
  <h1>We're Going <span>Global.</span></h1>
  <p class="sub"><span class="live-dot"></span>Live stats — updates every time someone visits</p>
</div>

<div class="grid">
  <div class="card big">
    <span class="num" id="total-visitors">40</span>
    <div class="label">TOTAL VISITORS</div>
  </div>
  <div class="card">
    <span class="num" id="member-count">...</span>
    <div class="label">CREW MEMBERS</div>
  </div>
  <div class="card">
    <span class="num">3</span>
    <div class="label">COUNTRIES REACHED</div>
  </div>
</div>

<div class="countries">
  <h2>🌍 Countries Reached</h2>
  <div class="country-row">
    <div class="country-name">🇺🇸 USA</div>
    <div class="country-bar-wrap"><div class="country-bar" style="width:55%"></div></div>
    <div class="country-count">22</div>
  </div>
  <div class="country-row">
    <div class="country-name">🇫🇷 France</div>
    <div class="country-bar-wrap"><div class="country-bar" style="width:25%"></div></div>
    <div class="country-count">10</div>
  </div>
  <div class="country-row">
    <div class="country-name">🇵🇱 Poland</div>
    <div class="country-bar-wrap"><div class="country-bar" style="width:22%"></div></div>
    <div class="country-count">9</div>
  </div>
</div>

<div class="share">
  <p>Share this page with your friends!</p>
  <div class="share-url">joyboxcompany.com/stats.html</div>
</div>

<script>
const SUPABASE_URL = 'https://qbzpyhsbrjagyqsruzcb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_fD1zz60o4p8oEDmWDKJeNg_wd-IAhbs';

async function loadCount() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/members?select=id`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Prefer': 'count=exact', 'Range': '0-0' }
    });
    const range = res.headers.get('content-range');
    document.getElementById('member-count').textContent = range ? range.split('/')[1] : '0';
  } catch(e) {
    document.getElementById('member-count').textContent = '2';
  }
}

loadCount();
</script>
</body>
</html>
