<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOIDBORN Trading Cards</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #08051a;
  min-height: 100vh;
  font-family: 'Rajdhani', sans-serif;
  color: #fff;
  overflow-x: hidden;
}

/* HEADER */
.header {
  text-align: center;
  padding: 48px 20px 32px;
  position: relative;
}
.header::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(100,0,200,0.3) 0%, transparent 70%);
  pointer-events: none;
}
.logo {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(32px, 6vw, 72px);
  font-weight: 900;
  background: linear-gradient(135deg, #9d4edd, #c77dff, #e0aaff, #ffd700);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  letter-spacing: 6px;
  line-height: 1;
}
.logo-sub {
  font-size: 13px;
  letter-spacing: 6px;
  color: rgba(255,255,255,0.4);
  margin-top: 8px;
  text-transform: uppercase;
}
.era-badge {
  display: inline-block;
  background: linear-gradient(135deg, #1a0a2e, #2a0a4e);
  border: 1px solid rgba(157,78,221,0.5);
  border-radius: 100px;
  padding: 6px 20px;
  font-size: 12px;
  letter-spacing: 3px;
  color: #c77dff;
  margin-top: 16px;
}

/* FILTER TABS */
.filters {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  padding: 0 20px 32px;
}
.filter-btn {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.6);
  padding: 8px 20px;
  border-radius: 100px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.2s;
}
.filter-btn:hover, .filter-btn.active {
  background: rgba(157,78,221,0.3);
  border-color: #9d4edd;
  color: #fff;
}

/* CARD GRID */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 32px;
  padding: 0 40px 80px;
  max-width: 1400px;
  margin: 0 auto;
}

/* THE CARD */
.card-wrap {
  perspective: 800px;
  cursor: pointer;
}

.card {
  width: 100%;
  aspect-ratio: 0.714;
  border-radius: 16px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.1s;
  user-select: none;
}

.card-inner {
  width: 100%;
  height: 100%;
  border-radius: 16px;
  position: relative;
  overflow: hidden;
  border: 2px solid rgba(255,255,255,0.15);
}

/* RARITY BACKGROUNDS */
.rarity-common .card-inner { background: linear-gradient(145deg, #1a1a2e, #16213e); border-color: rgba(150,150,150,0.3); }
.rarity-uncommon .card-inner { background: linear-gradient(145deg, #0d2137, #1a3a5c); border-color: rgba(0,150,255,0.4); }
.rarity-rare .card-inner { background: linear-gradient(145deg, #1a0a2e, #2a0a4e); border-color: rgba(157,78,221,0.6); }
.rarity-ultra .card-inner { background: linear-gradient(145deg, #1a0510, #3a0520); border-color: rgba(255,50,50,0.7); }
.rarity-secret .card-inner { background: linear-gradient(145deg, #0a1a0a, #1a3a1a); border-color: rgba(0,255,100,0.6); }
.rarity-legendary .card-inner { background: linear-gradient(145deg, #1a1000, #3a2000); border-color: rgba(255,215,0,0.8); }

/* HOLO OVERLAY */
.holo-overlay {
  position: absolute;
  inset: 0;
  border-radius: 14px;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
  mix-blend-mode: screen;
  z-index: 10;
}
.rarity-rare .holo-overlay {
  background: linear-gradient(135deg,
    rgba(255,0,128,0.15) 0%, rgba(0,255,255,0.15) 25%,
    rgba(128,0,255,0.15) 50%, rgba(255,255,0,0.15) 75%,
    rgba(0,255,128,0.15) 100%);
}
.rarity-ultra .holo-overlay {
  background: conic-gradient(
    rgba(255,0,0,0.2), rgba(255,128,0,0.2), rgba(255,255,0,0.2),
    rgba(0,255,0,0.2), rgba(0,0,255,0.2), rgba(255,0,255,0.2), rgba(255,0,0,0.2));
}
.rarity-secret .holo-overlay {
  background: linear-gradient(45deg,
    rgba(0,255,100,0.2) 0%, rgba(100,255,255,0.2) 50%, rgba(0,255,100,0.2) 100%);
}
.rarity-legendary .holo-overlay {
  background: linear-gradient(135deg,
    rgba(255,215,0,0.25) 0%, rgba(255,255,255,0.1) 50%, rgba(255,215,0,0.25) 100%);
}
.card-wrap:hover .holo-overlay { opacity: 1; }

/* SHIMMER EFFECT */
.shimmer {
  position: absolute;
  inset: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.08) 50%, transparent 60%);
  opacity: 0;
  pointer-events: none;
  z-index: 11;
  transition: opacity 0.3s;
}
.card-wrap:hover .shimmer { opacity: 1; animation: shimmerMove 1.5s infinite; }
@keyframes shimmerMove {
  0% { transform: translateX(-100%) rotate(0deg); }
  100% { transform: translateX(100%) rotate(0deg); }
}

/* CARD CONTENT */
.card-faction {
  position: absolute;
  top: 10px;
  left: 12px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
}
.card-rarity-icon {
  position: absolute;
  top: 10px;
  right: 12px;
  font-size: 14px;
}
.card-art {
  position: absolute;
  top: 26px;
  left: 8px;
  right: 8px;
  height: 42%;
  border-radius: 10px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 72px;
  background: rgba(0,0,0,0.3);
}
.card-art-bg {
  position: absolute;
  inset: 0;
  opacity: 0.3;
}
.card-name {
  position: absolute;
  top: calc(26px + 42% + 8px);
  left: 8px;
  right: 8px;
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(11px, 2vw, 15px);
  font-weight: 900;
  text-align: center;
  color: #fff;
  text-shadow: 0 0 10px currentColor;
  line-height: 1.2;
}
.card-type {
  position: absolute;
  top: calc(26px + 42% + 30px);
  left: 8px;
  right: 8px;
  text-align: center;
  font-size: 9px;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
}
.card-divider {
  position: absolute;
  top: calc(26px + 42% + 44px);
  left: 12px;
  right: 12px;
  height: 1px;
  background: rgba(255,255,255,0.1);
}
.card-desc {
  position: absolute;
  top: calc(26px + 42% + 52px);
  left: 10px;
  right: 10px;
  font-size: 9px;
  line-height: 1.5;
  color: rgba(255,255,255,0.6);
  text-align: center;
  font-style: italic;
}
.card-stats {
  position: absolute;
  bottom: 28px;
  left: 8px;
  right: 8px;
  display: flex;
  justify-content: space-around;
}
.stat {
  text-align: center;
  flex: 1;
}
.stat-val {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  font-weight: 900;
  color: #fff;
  line-height: 1;
}
.stat-name {
  font-size: 7px;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
}
.card-number {
  position: absolute;
  bottom: 8px;
  left: 10px;
  font-size: 8px;
  color: rgba(255,255,255,0.25);
  letter-spacing: 1px;
}
.card-set {
  position: absolute;
  bottom: 8px;
  right: 10px;
  font-size: 8px;
  color: rgba(255,255,255,0.25);
  letter-spacing: 1px;
}

/* FACTION COLORS */
.faction-void .card-name { color: #c77dff; text-shadow: 0 0 15px #9d4edd; }
.faction-solar .card-name { color: #ffd700; text-shadow: 0 0 15px #ff8c00; }
.faction-iron .card-name { color: #aaaaaa; text-shadow: 0 0 15px #888; }
.faction-wild .card-name { color: #00ff88; text-shadow: 0 0 15px #00aa44; }
.faction-storm .card-name { color: #00ccff; text-shadow: 0 0 15px #0088ff; }
.faction-ancient .card-name { color: #ff8c42; text-shadow: 0 0 15px #cc4400; }

/* LEGENDARY GLOW */
.rarity-legendary .card-inner {
  box-shadow: inset 0 0 30px rgba(255,215,0,0.1), 0 0 30px rgba(255,215,0,0.3);
  animation: legendaryPulse 2s ease-in-out infinite;
}
@keyframes legendaryPulse {
  0%,100% { box-shadow: inset 0 0 30px rgba(255,215,0,0.1), 0 0 20px rgba(255,215,0,0.2); }
  50% { box-shadow: inset 0 0 40px rgba(255,215,0,0.2), 0 0 40px rgba(255,215,0,0.5); }
}
.rarity-secret .card-inner {
  animation: secretPulse 3s ease-in-out infinite;
}
@keyframes secretPulse {
  0%,100% { border-color: rgba(0,255,100,0.4); box-shadow: 0 0 15px rgba(0,255,100,0.2); }
  50% { border-color: rgba(100,255,255,0.8); box-shadow: 0 0 30px rgba(100,255,255,0.4); }
}

/* RARITY LABEL */
.rarity-label {
  text-align: center;
  margin-top: 10px;
  font-size: 10px;
  letter-spacing: 3px;
  font-weight: 700;
  text-transform: uppercase;
}
.rarity-common .rarity-label { color: #888; }
.rarity-uncommon .rarity-label { color: #4da6ff; }
.rarity-rare .rarity-label { color: #c77dff; }
.rarity-ultra .rarity-label { color: #ff4466; }
.rarity-secret .rarity-label { color: #00ff88; }
.rarity-legendary .rarity-label { color: #ffd700; }

/* FOOTER */
.footer {
  text-align: center;
  padding: 40px;
  border-top: 1px solid rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.3);
  font-size: 12px;
  letter-spacing: 2px;
}
.footer a { color: #e63030; text-decoration: none; }

/* CARD MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(10px);
}
.modal-overlay.open { display: flex; }
.modal-card { width: min(320px, 85vw); }
.modal-close {
  position: fixed; top: 20px; right: 24px;
  background: none; border: none; color: #fff;
  font-size: 32px; cursor: pointer; z-index: 1001;
}
</style>
</head>
<body>

<div class="header">

};
const RARITY_LABELS = {

};

function makeCardHTML(card, big) {
  const sz = big ? 'font-size:80px' : '';
  return `
  <div class="card-wrap rarity-${card.rarity} faction-${card.faction}"
       onclick="openModal('${card.id}')"
       onmousemove="tiltCard(event,this)"

      <div class="card-inner" style="background:${card.bg}">
        <div class="holo-overlay"></div>
        <div class="shimmer"></div>

        </div>

        <div class="card-divider"></div>
        <div class="card-desc">${card.desc}</div>

function renderCards(filter) {
  const grid = document.getElementById('card-grid');
  const filtered = filter === 'all' ? CARDS :
    filter === 'legendary' ? CARDS.filter(c => c.rarity === 'legendary') :
    CARDS.filter(c => c.faction === filter);
  grid.innerHTML = filtered.map(c => makeCardHTML(c)).join('');
}

function filterCards(faction, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(faction);
}

function tiltCard(e, wrap) {
  const card = wrap.querySelector('.card');
  const rect = wrap.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width - 0.5;
  const y = (e.clientY - rect.top) / rect.height - 0.5;
  card.style.transform = `rotateY(${x*20}deg) rotateX(${-y*20}deg) scale(1.05)`;
  const holo = wrap.querySelector('.holo-overlay');
  if(holo) {
    holo.style.backgroundPosition = `${x*100+50}% ${y*100+50}%`;
    holo.style.opacity = '0.8';
  }
}

function resetTilt(wrap) {
  const card = wrap.querySelector('.card');
  card.style.transform = '';
  const holo = wrap.querySelector('.holo-overlay');
  if(holo) holo.style.opacity = '';
}

function openModal(id) {
  const card = CARDS.find(c => c.id === id);
  if(!card) return;
  document.getElementById('modal-card').innerHTML = makeCardHTML(card, true);
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

renderCards('all');
</script>
</body>
</html>
